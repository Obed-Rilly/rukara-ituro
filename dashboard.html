<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rukara Ituro Dashboard</title>
<style>
body{
font-family:Arial;
background:#f4f4f4;
padding:0;
margin:0;
}
header{
background:#1565c0;
color:white;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}
.container{
padding:15px;
}
.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}
input{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
box-sizing:border-box;
}
button{
padding:12px 20px;
border:none;
border-radius:6px;
margin-top:10px;
font-size:16px;
cursor:pointer;
}
.save{
background:#1565c0;
color:white;
}
.delete{
background:red;
color:white;
}
.logout{
background:black;
color:white;
width:100%;
}
.member{
padding:10px;
border-bottom:1px solid #ddd;
}
.total{
font-size:22px;
font-weight:bold;
color:#1565c0;
}
</style>
</head>
<body>

<header>Rukara Ituro Dashboard</header>

<div class="container">

<div class="card">
<h2>Kwandikisha Umukirisitu</h2>

<input type="text" id="name" placeholder="Amazina">
<input type="number" id="amount" placeholder="Ituro">

<button class="save" onclick="saveMember()">Bika</button>
</div>

<div class="card">
<h2>Shakisha</h2>
<input type="text" id="search" placeholder="Shakisha umukirisitu" onkeyup="searchMember()">
</div>

<div class="card">
<h2>Total y'Amaturo</h2>
<p class="total" id="total">0 Frw</p>
</div>

<div class="card">
<h2>Abakirisitu</h2>
<div id="members"></div>
</div>

<div class="card">
<button class="logout" onclick="logout()">Logout</button>
</div>

</div>

<script>
let members = JSON.parse(localStorage.getItem("members")) || [];

function saveMember(){
let name = document.getElementById("name").value;
let amount = document.getElementById("amount").value;

if(name=="" || amount==""){
alert("Uzuza amakuru yose");
return;
}

members.push({name:name, amount:amount});
localStorage.setItem("members", JSON.stringify(members));

document.getElementById("name").value="";
document.getElementById("amount").value="";

showMembers();
}

function showMembers(){
let list = document.getElementById("members");
list.innerHTML="";

let total = 0;

members.forEach((member,index)=>{

total += Number(member.amount);

list.innerHTML += `
<div class="member">
<b>${member.name}</b><br>
Ituro: ${member.amount} Frw<br>
<button class="delete" onclick="deleteMember(${index})">Delete</button>
</div>
`;
});

document.getElementById("total").innerHTML = total + " Frw";
}

function deleteMember(index){
members.splice(index,1);
localStorage.setItem("members", JSON.stringify(members));
showMembers();
}

function searchMember(){
let keyword = document.getElementById("search").value.toLowerCase();
let list = document.getElementById("members");
list.innerHTML="";

members.filter(member => member.name.toLowerCase().includes(keyword))
.forEach((member,index)=>{
list.innerHTML += `
<div class="member">
<b>${member.name}</b><br>
Ituro: ${member.amount} Frw
</div>
`;
});
}

function logout(){
window.location.href="index.html";
}

showMembers();
</script>

</body>
</html>
