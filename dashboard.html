<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">

<img src="logo.png" class="logo-small">

<h2>RUKARA</h2>

<a href="dashboard.html">Home</a>
<a href="search.html">Search</a>
<a href="#">Reports</a>
<a href="#" onclick="logout()">Logout</a>

</div>

<div class="main">

<div class="topbar">
<h1>Dashboard</h1>
<p id="today"></p>
</div>

<div class="cards">
<div class="card">
<h3>Total Kiliziya</h3>
<p id="totalKiliziya">0 Frw</p>
</div>

<div class="card">
<h3>Total Noheli</h3>
<p id="totalNoheli">0 Frw</p>
</div>

<div class="card">
<h3>Total Pasika</h3>
<p id="totalPasika">0 Frw</p>
</div>
</div>

<div class="form-box">

<h2>Kwandikisha Contribution</h2>

<input type="text" id="amazina" placeholder="Amazina">
<input type="text" id="numero" placeholder="Numero y'Umukristu">
<input type="text" id="phone" placeholder="Phone Number (optional)">
<input type="text" id="santarali" placeholder="Santarali">
<input type="text" id="umuryangoremezo" placeholder="Umuryangoremezo">

<input type="number" id="kiliziya" placeholder="Ituro rya Kiliziya">
<input type="number" id="noheli" placeholder="Noheli">
<input type="number" id="pasika" placeholder="Pasika">
<input type="number" id="asomusiyo" placeholder="Asomusiyo">
<input type="number" id="inyubako" placeholder="Inyubako">
<input type="number" id="diyosezi" placeholder="Inkunga ya Diyosezi">

<input type="date" id="italiki">
<input type="number" id="umwaka" placeholder="Umwaka Contribution">

<button onclick="saveMember()">Save Contribution</button>

</div>

<div id="members"></div>

</div>

<script src="app.js"></script>

</body>
</html>
