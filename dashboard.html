<!DOCTYPE html>
<html>
<head>
  <title>Rukara Ituro Dashboard</title>

  <link rel="stylesheet" href="style.css">

  <script type="module" src="app.js"></script>
</head>

<body>

<header>

  <img src="logo.png" class="logo">

  <h1>Rukara Ituro System V3</h1>

</header>

<div class="container">

  <div class="card">

    <h2>Kwandikisha Umukristu</h2>

    <input type="text" id="amazina" placeholder="Amazina">

    <input type="text" id="phone" placeholder="Phone Number">

    <input type="text" id="santarali" placeholder="Santarali">

    <input type="text" id="umuryangoremezo" placeholder="Umuryangoremezo">

    <input type="text" id="year" placeholder="Umwaka">

    <input type="text" id="date" placeholder="Day/Month/Year">

    <h3>Contributions</h3>

    <input type="number" id="kiliziya" placeholder="Ituro rya Kiliziya">

    <input type="number" id="noheli" placeholder="Noheli">

    <input type="number" id="pasika" placeholder="Pasika">

    <input type="number" id="asomusiyo" placeholder="Asomusiyo">

    <input type="number" id="inyubako" placeholder="Inyubako">

    <input type="number" id="diyosezi" placeholder="Inkunga ya Diyosezi">

    <button onclick="saveChristian()">SAVE</button>

  </div>

  <div class="card">

    <h2>Abakristu</h2>

    <div id="list"></div>

  </div>

</div>

<script>
  setTimeout(() => {
    loadChristians();
  }, 1000);
</script>

</body>
</html>
