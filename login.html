<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Rukara Ituro System</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f5f5f5;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }

    .login-box{
      background:white;
      padding:30px;
      border-radius:10px;
      width:320px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h1{
      text-align:center;
      margin-bottom:25px;
      color:#222;
    }

    input{
      width:100%;
      padding:12px;
      margin-bottom:15px;
      border:1px solid #ccc;
      border-radius:5px;
      font-size:16px;
    }

    button{
      width:100%;
      padding:12px;
      background:#007bff;
      color:white;
      border:none;
      border-radius:5px;
      font-size:16px;
      cursor:pointer;
    }

    button:hover{
      background:#0056b3;
    }

    .error{
      color:red;
      text-align:center;
      margin-top:10px;
      display:none;
    }
  </style>
</head>

<body>

  <div class="login-box">
    <h1>Login</h1>

    <input type="text" id="username" placeholder="Username">

    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p class="error" id="error">
      Incorrect Username or Password
    </p>
  </div>

  <script>
    function login() {

      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      // Admin credentials
      const adminUser = "admin";
      const adminPass = "1234";

      if(username === adminUser && password === adminPass){

        // Redirect to dashboard
        window.location.href = "dashboard.html";

      } else {

        document.getElementById("error").style.display = "block";

      }
    }
  </script>

</body>
</html>
