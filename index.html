<!DOCTYPE html>
<html>
<head>
  <title>Rukara Ituro</title>

  <style>
    body{
      font-family: Arial;
      background:#f5f5f5;
      padding:20px;
    }

    .box{
      background:white;
      padding:20px;
      border-radius:10px;
      max-width:400px;
      margin:auto;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    input{
      width:100%;
      padding:12px;
      margin-top:10px;
      margin-bottom:15px;
      border:1px solid #ccc;
      border-radius:5px;
    }

    button{
      width:100%;
      padding:12px;
      background:#0066cc;
      color:white;
      border:none;
      border-radius:5px;
      font-size:18px;
    }

    h1,h2,p{
      text-align:center;
    }
  </style>
</head>

<body>

<div class="box">

<h1>Rukara Ituro</h1>
<p>Paroisse Rukara Annual Contribution System</p>

<hr>

<h2>Login</h2>

<input id="email" type="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Injira</button>

</div>

<script>
function login() {

let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

if(email=="admin@gmail.com" && password=="1234"){
    window.location.href="dashboard.html";
}
else{
    alert("Email cyangwa password si byo");
}

}
</script>

</body>
</html>
